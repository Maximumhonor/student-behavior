<html lang="th">
<head>

<title>ระบบคะแนนพฤติกรรมนักเรียน</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Prompt:wght@400;500;600;700&display=swap');
:root{
  --bg:#F0F4FF;
  --surface:#FFFFFF;
  --border:#D6E2FF;
  --border-soft:#E8EFFE;
  --text:#1A1E2E;
  --muted:#6B7280;
  --pink:#D64F8A;
  --pink-dark:#B83875;
  --pink-bg:#FDF0F7;
  --pink-bd:#F4BFDA;
  --pink-light:#FDE8F3;
  --blue:#1A6BC4;
  --blue-dark:#1455A0;
  --blue-bg:#EBF3FF;
  --blue-bd:#B5D1F5;
  --blue-light:#DDEEFF;
  --green:#1A7A4A;
  --green-bg:#E8F8EF;
  --green-bd:#9EDCBB;
  --red:#C0392B;
  --red-bg:#FEF0EE;
  --red-bd:#F5B7B1;
  --amber:#B45309;
  --amber-bg:#FFFBEB;
  --amber-bd:#FCD34D;
  --r:16px;--rs:10px;
  --shadow-sm:0 1px 3px rgba(26,107,196,.08),0 1px 2px rgba(26,107,196,.05);
  --shadow-md:0 4px 16px rgba(26,107,196,.12),0 2px 6px rgba(26,107,196,.07);
  --shadow-lg:0 8px 32px rgba(26,107,196,.15),0 4px 12px rgba(26,107,196,.08);
  --gradient-pink:linear-gradient(135deg,#D64F8A,#E87DBF);
  --gradient-blue:linear-gradient(135deg,#1A6BC4,#4DA0F0);
  --gradient-hero:linear-gradient(135deg,#1A6BC4 0%,#D64F8A 100%);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;background-image:radial-gradient(circle at 20% 20%,rgba(214,79,138,.06) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(26,107,196,.07) 0%,transparent 50%)}
.app{max-width:480px;margin:0 auto;padding:1.25rem}@media(min-width:768px){.app{max-width:98vw;padding:1.25rem 2rem}.app-desktop{display:flex;gap:1.5rem;align-items:flex-start}.app-sidebar{width:340px;flex-shrink:0;position:sticky;top:1rem}.app-main{flex:1;min-width:0;max-width:640px;margin:0 auto}}
.card{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--r);padding:1.375rem;box-shadow:var(--shadow-sm)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'Sarabun',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;font-weight:500}
.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-sm);opacity:.9}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-g{background:var(--gradient-blue);color:#fff;border:none;box-shadow:0 2px 8px rgba(26,107,196,.3)}
.btn-g:hover{box-shadow:0 4px 14px rgba(26,107,196,.4)}
.btn-r{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.btn-b{background:var(--gradient-blue);color:#fff;border:none;box-shadow:0 2px 8px rgba(26,107,196,.25)}
.btn-b:hover{box-shadow:0 4px 14px rgba(26,107,196,.35)}
.btn-a{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bd)}
.btn-pk{background:var(--gradient-pink);color:#fff;border:none;box-shadow:0 2px 8px rgba(214,79,138,.3)}
.btn-pk:hover{box-shadow:0 4px 14px rgba(214,79,138,.4)}
.btn-full{width:100%;justify-content:center;font-size:15px;padding:12px}
.btn-back{background:none;border:none;color:var(--muted);font-family:'Sarabun',sans-serif;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;margin-bottom:1rem;padding:0;transition:color .2s}
.btn-back:hover{color:var(--blue)}
input,textarea{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--rs);font-family:'Sarabun',sans-serif;font-size:14px;background:#fff;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
input:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,107,196,.1)}
textarea{resize:vertical;min-height:72px}
label{font-size:13px;color:var(--muted);display:block;margin-bottom:5px;font-weight:500}
.frow{margin-bottom:1.1rem}
.sec{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.75rem;margin-top:1.375rem}
.sec:first-child{margin-top:0}
.badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;letter-spacing:.01em}
.bp{background:var(--green-bg);color:var(--green)}
.bm{background:var(--red-bg);color:var(--red)}
.bb{background:var(--blue-bg);color:var(--blue)}
.ba{background:var(--amber-bg);color:var(--amber)}
.log-item{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border-soft);font-size:14px;gap:8px}
.log-item:last-child{border-bottom:none}
.ldate{font-size:12px;color:var(--muted);white-space:nowrap}
.srow{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border-soft);gap:8px;transition:background .15s}
.srow:last-child{border-bottom:none}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.av-boy{background:var(--blue-light);color:var(--blue-dark)}
.av-girl{background:var(--pink-light);color:var(--pink-dark)}
.tabs{display:flex;border-bottom:2px solid var(--border-soft);margin-bottom:1.25rem;overflow-x:auto;gap:0}
.tab{background:none;border:none;border-bottom:2px solid transparent;padding:9px 13px;font-family:'Sarabun',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;white-space:nowrap;margin-bottom:-2px;transition:all .2s;font-weight:500}
.tab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.25rem}
.sc{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--rs);padding:.7rem .5rem;text-align:center;box-shadow:var(--shadow-sm)}
.sl{font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.sv{font-size:1.2rem;font-weight:700}
.hw-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.hwc{border-radius:var(--rs);padding:10px 12px;cursor:pointer;transition:transform .15s,box-shadow .15s}
.hwc:hover{transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.hwd{background:linear-gradient(135deg,#E8F8EF,#D4F0E3);border:1px solid var(--green-bd)}
.hwm{background:linear-gradient(135deg,#FEF0EE,#FDE0DC);border:1px solid var(--red-bd)}
.hwd .hn{color:var(--green);font-size:13px;font-weight:600}
.hwm .hn{color:var(--red);font-size:13px;font-weight:600}
.hwd .hs{color:var(--green);font-size:11px;margin-top:4px;font-weight:500}
.hwm .hs{color:var(--red);font-size:11px;margin-top:4px;font-weight:500}
.hdate{font-size:11px;color:var(--muted);margin-top:2px}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.pbtn{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rs);padding:10px 12px;text-align:left;cursor:pointer;font-family:'Sarabun',sans-serif;transition:all .2s}
.pbtn:hover{border-color:var(--blue);background:var(--blue-bg);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.ritem{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--border-soft)}
.ritem:last-child{border-bottom:none}
.pcard{background:linear-gradient(135deg,var(--amber-bg),#FEF9E7);border:1px solid var(--amber-bd);border-radius:var(--rs);padding:13px;margin-bottom:8px;box-shadow:var(--shadow-sm)}
.merr{background:var(--red-bg);color:var(--red);border-radius:var(--rs);padding:11px 14px;font-size:14px;margin-bottom:1rem;border:1px solid var(--red-bd)}
.mok{background:var(--green-bg);color:var(--green);border-radius:var(--rs);padding:11px 14px;font-size:14px;margin-bottom:1rem;border:1px solid var(--green-bd)}
.ndot{width:8px;height:8px;background:#E24B4A;border-radius:50%;display:inline-block;margin-left:4px;vertical-align:middle;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.85)}}
.lwrap{max-width:340px;margin:2rem auto}
.ltitle{font-size:21px;font-weight:700;text-align:center;margin-bottom:1.5rem;font-family:'Prompt',sans-serif;color:var(--text)}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;max-width:900px;margin:0 auto;width:100%}
.mcard{background:rgba(255,255,255,.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1.5px solid rgba(255,255,255,.6);border-radius:24px;padding:3rem 2rem;text-align:center;cursor:pointer;transition:all .25s;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.mcard:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.mcard-t{border-top:4px solid var(--blue)}
.mcard-p{border-top:4px solid var(--pink)}
.hrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.375rem;gap:8px;flex-wrap:wrap}.hrow-sticky{position:sticky;top:0;z-index:100;background:var(--bg);padding:.75rem 0;margin:-0.75rem 0 1rem;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.ptitle{font-size:20px;font-weight:700;font-family:'Prompt',sans-serif}
.pbig{border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.pbig img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.la{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem}
.la-t{background:var(--blue-bg);color:var(--blue)}
.la-p{background:var(--pink-bg);color:var(--pink)}
.id-chip{font-size:11px;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:2px 9px;color:var(--muted);font-family:monospace;display:inline-block;margin-top:3px;letter-spacing:.03em}
.sw{position:relative;margin-bottom:1.1rem}
.sw i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px}
.sw input{padding-left:34px}
.student-header{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:1.25rem;box-shadow:var(--shadow-sm)}
.hero-wrap{position:relative;margin:-1.25rem -1.25rem 1.75rem;border-radius:var(--r) var(--r) 0 0;overflow:hidden;height:190px}
.hero-title{font-size:17px;font-weight:700;line-height:1.35;font-family:'Prompt',sans-serif;color:#1A1E2E}
.hero-sub{font-size:13px;color:var(--muted);margin-bottom:.5rem}
.section-banner{background:var(--gradient-hero);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:1.5rem;color:#fff;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-md)}

.chat-wrap{display:flex;flex-direction:column;height:420px}
.chat-messages{flex:1;overflow-y:auto;padding:.75rem 0;display:flex;flex-direction:column;gap:10px}
.chat-bubble{max-width:78%;padding:9px 13px;border-radius:16px;font-size:14px;line-height:1.45;position:relative}
.chat-bubble.from-teacher{background:linear-gradient(135deg,var(--blue-bg),#D6EAFF);border:1px solid var(--blue-bd);border-bottom-left-radius:4px;align-self:flex-start}
.chat-bubble.from-parent{background:linear-gradient(135deg,var(--pink-bg),#FFE0F0);border:1px solid var(--pink-bd);border-bottom-right-radius:4px;align-self:flex-end}
.chat-meta{font-size:11px;color:var(--muted);margin-top:4px}
.chat-input-row{display:flex;gap:8px;margin-top:.75rem;align-items:flex-end}
.chat-input-row textarea{border-radius:12px;min-height:44px;max-height:100px;padding:10px 14px;font-size:14px}
.chat-send{flex-shrink:0;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--gradient-blue);border:none;color:#fff;cursor:pointer;font-size:18px;box-shadow:0 2px 8px rgba(26,107,196,.3);transition:all .2s}
.chat-send:hover{transform:scale(1.08);box-shadow:0 4px 14px rgba(26,107,196,.4)}
.chat-empty{text-align:center;padding:2rem;color:var(--muted);font-size:14px}
.chat-name{font-size:11px;font-weight:600;margin-bottom:3px;color:var(--blue)}
.chat-name.parent{color:var(--pink-dark)}
.unread-badge{background:var(--pink);color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 6px;margin-left:4px;vertical-align:middle}
@media(min-width:600px){.av-grid{grid-template-columns:repeat(4,1fr)!important;gap:10px!important;width:100%!important}}
@media(min-width:900px){.av-grid{grid-template-columns:repeat(6,1fr)!important;gap:12px!important;width:100%!important}}
@media(min-width:1200px){.av-grid{grid-template-columns:repeat(10,1fr)!important;gap:12px!important;width:100%!important}}@media(min-width:1600px){.av-grid{grid-template-columns:repeat(13,1fr)!important;gap:12px!important;width:100%!important}}
</style>
</head>

async function api(method,path,body){
  const res=await fetch('/api'+path,{method,headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});
  return res.json();
}
async function loadDB(){
  const data=await api('GET','/data');
  DB=data||{students:{},requests:{}};
  // Don't re-render if user is typing in chat box
  const active = document.activeElement;
  if(active && (active.id==='chat_input'||active.id==='chat_input_p')){
    // Update DB silently but don't re-render - just update chat messages
    const chatbox = document.getElementById('chatbox')||document.getElementById('chatboxP');
    if(chatbox){
      const sid = S.sid;
      const msgs = Object.values(DB.messages||{}).filter(m=>m.studentId===sid).sort((a,b)=>(a.ts||0)-(b.ts||0));
      const from = S.role==='parent'?'parent':'teacher';
      const bubbles = msgs.map(m=>`
        <div style="display:flex;flex-direction:column;align-items:${m.from===from?'flex-end':'flex-start'}">
          <div style="font-size:11px;font-weight:600;margin-bottom:3px;color:${m.from===from?'var(--pink-dark)':'var(--blue)'}">${m.from==='teacher'?'ครู':m.from==='parent'?'ผู้ปกครอง':''}</div>
          <div style="max-width:78%;padding:9px 13px;border-radius:16px;font-size:14px;line-height:1.45;background:${m.from===from?'linear-gradient(135deg,var(--pink-bg),#FFE0F0)':'linear-gradient(135deg,var(--blue-bg),#D6EAFF)'};border:1px solid ${m.from===from?'var(--pink-bd)':'var(--blue-bd)'}">${(m.text||'').replace(/\n/g,'<br>')}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:4px">${m.timeStr||''}</div>
        </div>`).join('');
      const box = document.getElementById('chatbox')||document.getElementById('chatboxP');
      const wasAtBottom = box ? box.scrollHeight - box.scrollTop - box.clientHeight < 40 : false;
      if(box && msgs.length > 0){ box.innerHTML = bubbles; if(wasAtBottom) box.scrollTop = box.scrollHeight; }
    }
    return;
  }
  // seed if empty
  if(!Object.keys(DB.students).length){
    const hw={};SUBJECTS.forEach(s=>{hw[s]={done:false,date:today()};});
    INIT.forEach(s=>{DB.students[s.id]={...s,photo:null,logs:[],redeemLogs:[],hw:{...hw}};});
    seedAllScores();
    await api('POST','/data',DB);
  } else {
    // Seed scores for existing students who have no logs yet
    let changed = false;
    for(const [sid, s] of Object.entries(DB.students)){
      if(!s.logs || s.logs.length === 0){
        const entry = Object.entries(DB.students).find(([,st])=>st.name===s.name);
        // will be handled by seedAllScores
      }
    }
    seedAllScores();
    await api('POST','/data',DB);
  }
  const ls=document.getElementById('loading-screen');if(ls)ls.style.display='none';
  render();
}
function startPoll(){if(pollTimer)clearInterval(pollTimer);pollTimer=setInterval(loadDB,3000);}
function stopPoll(){if(pollTimer){clearInterval(pollTimer);pollTimer=null;}}

function render(){
  // Save all active input state before re-render
  const active = document.activeElement;
  const prevId = active?.id||'';
  const prevVal = active?.value||'';
  const prevStart = active?.selectionStart;
  const prevEnd = active?.selectionEnd;
  const prevTag = active?.tagName||'';

  const root=document.getElementById('app');root.innerHTML='';
  document.getElementById('loading-screen')?.remove();
  const el=document.createElement('div');
  if(S.view==='menu')el.innerHTML=vMenu();
  else if(S.view==='tlogin')el.innerHTML=vTLogin();
  else if(S.view==='tlist')el.innerHTML=vTList();
  else if(S.view==='tstudent')el.innerHTML=vTStudent();
  else if(S.view==='taddlog')el.innerHTML=vAddLog();
  else if(S.view==='taddstudent')el.innerHTML=vAddStudent();
  else if(S.view==='tpending')el.innerHTML=vPendingAll();
  else if(S.view==='plogin')el.innerHTML=vPLogin();
  else if(S.view==='pview')el.innerHTML=vPView();
  root.appendChild(el);
  // Restore focus to any input/textarea that was active before render
  if(prevId && (prevTag==='INPUT'||prevTag==='TEXTAREA')){
    const inp = document.getElementById(prevId);
    if(inp){
      inp.focus();
      if(prevTag==='TEXTAREA'||inp.type!=='file'){
        inp.value = prevVal;
        try{ inp.setSelectionRange(prevStart, prevEnd); }catch(e){}
      }
    }
  }
}

function getAnimal(name,isGirl){
  const animals=['cat','rabbit','bear','panda','fox','koala','frog','owl','lion','tiger','elephant','duck','penguin','chick','dog','hamster','deer','unicorn','sheep','pig','blob','cyclops','ghost','slime','dragon','witch','vampire','zombie','goblin','yeti','alien','astronaut','robot','ufo','planet','star','comet','rocket','cyborg','meteor','ninja','wizard','knight','pirate','chef','cactus','rainbow','cloud','sun','icecream'];
  let hash=0;
  for(let i=0;i<name.length;i++) hash=(hash*31+name.charCodeAt(i))&0xFFFF;
  return animals[hash%animals.length];
}
function getStudentAnimal(s){return s.chosenAnimal||getAnimal(s.name,isGirl(s.name));}
async function doChooseAnimal(sid,animal){
  const s=DB.students[sid];if(!s)return;
  s.chosenAnimal=animal;
  await api('PATCH',`/students/${sid}`,{chosenAnimal:animal});
  render();
}

function vTList(){
  const pc=pendAll().length;
  const q=(S.search||'').toLowerCase();
  const entries=Object.entries(DB.students)
    .filter(([,s])=>!q||s.name.includes(S.search)||(s.idcard||'').includes(S.search)||(s.sid||'').includes(S.search))
    .sort(([,a],[,b])=>(a.no||999)-(b.no||999));

  const cards=entries.map(([sid,s])=>{
    const t=tot(s);
    const g=isGirl(s.name);
    const animal=getStudentAnimal(s);
    const pend=pendSid(sid).length;
    const unread=unreadForStudent(sid);
    const shortN=shortName(s.name);
    const firstName=shortN.split(' ')[0];
    const scoreCol=t>0?'var(--green)':t<0?'var(--red)':'var(--muted)';
    const avatarContent=s.photo
      ?`<img src="${s.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
      :drawAnimalSVG(animal,g,76);
    return`<div onclick="selStu('${sid}')" style="display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;padding:1rem .5rem .85rem;border-radius:18px;background:var(--surface);border:1px solid var(--border-soft);box-shadow:var(--shadow-sm);transition:all .2s;position:relative" onmouseover="this.style.transform='translateY(-3px)';this.style.boxShadow='0 6px 20px rgba(26,107,196,.15)'" onmouseout="this.style.transform='';this.style.boxShadow=''">
      ${pend>0||unread>0?`<div style="position:absolute;top:6px;right:6px;width:10px;height:10px;background:#E24B4A;border-radius:50%;border:2px solid white"></div>`:''}
      <div style="position:absolute;top:6px;left:8px;font-size:10px;font-weight:700;color:var(--muted);line-height:1">${s.no||''}</div>
      <div style="width:76px;height:76px;border-radius:50%;overflow:hidden;border:3px solid ${g?'#F4BFDA':'#B5D1F5'};box-shadow:0 2px 8px rgba(0,0,0,.1)">${avatarContent}</div>
      <div style="font-size:12px;font-weight:600;color:var(--text);text-align:center;line-height:1.3;width:100%;padding:0 4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${firstName}</div>
      <div style="font-size:13px;font-weight:700;color:${scoreCol}">${t>=0?'+':''}${t}</div>
    </div>`;
  }).join('');

  const editModal=S.editSid?(()=>{
    const es=DB.students[S.editSid];if(!es)return'';
    return`<div style="position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;display:flex;align-items:center;justify-content:center;padding:1.25rem">
      <div style="background:var(--surface);border-radius:var(--r);padding:1.5rem;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.18)">
        <div style="font-size:16px;font-weight:700;margin-bottom:1.25rem;display:flex;justify-content:space-between;align-items:center">
          แก้ไขข้อมูลนักเรียน
          <button onclick="S.editSid=null;render()" style="background:none;border:none;cursor:pointer;font-size:20px;color:var(--muted)">×</button>
        </div>
        <div style="display:flex;gap:8px">
          <div class="frow" style="flex:1"><label>เลขที่</label><input type="number" id="edit_no" value="${es.no||''}" placeholder="เลขที่"></div>
          <div class="frow" style="flex:2"><label>เลขประจำตัว</label><input type="text" id="edit_sid" value="${es.sid||''}" placeholder="กรอกเลขประจำตัว"></div>
        </div>
        <div class="frow"><label>ชื่อ-นามสกุล</label><input type="text" id="edit_name" value="${es.name}" placeholder="ชื่อ-นามสกุล"></div>
        <div class="frow"><label>เลขบัตรประชาชน (13 หลัก)</label><input type="text" id="edit_idcard" maxlength="13" value="${es.idcard}" placeholder="เลขบัตรประชาชน"></div>
        <div style="display:flex;gap:8px;margin-top:.5rem">
          <button class="btn" style="flex:1;justify-content:center" onclick="S.editSid=null;render()">ยกเลิก</button>
          <button class="btn btn-b" style="flex:1;justify-content:center" onclick="doSaveEdit('${S.editSid}')"><i class="ti ti-device-floppy"></i> บันทึก</button>
        </div>
      </div>
    </div>`;
  })():'';

  const rewardModal=(S.editRewardIdx!==null&&S.editRewardIdx!==undefined)?(()=>{
    const er=getRewards()[S.editRewardIdx]||{name:'',cost:''};
    return`<div style="position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;display:flex;align-items:center;justify-content:center;padding:1.25rem">
      <div style="background:var(--surface);border-radius:var(--r);padding:1.5rem;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.18)">
        <div style="font-size:16px;font-weight:700;margin-bottom:1.25rem;display:flex;justify-content:space-between;align-items:center">
          ${S.editRewardIdx===-1?'เพิ่มสิทธิพิเศษ':'แก้ไขสิทธิพิเศษ'}
          <button onclick="S.editRewardIdx=null;render()" style="background:none;border:none;cursor:pointer;font-size:20px;color:var(--muted)">×</button>
        </div>
        <div class="frow"><label>ชื่อสิทธิพิเศษ</label><input type="text" id="rew_name" value="${er.name}" placeholder="เช่น หยุดส่งการบ้าน 1 วัน"></div>
        <div class="frow"><label>คะแนนที่ใช้แลก</label><input type="number" id="rew_cost" value="${er.cost}" min="1" placeholder="เช่น 5"></div>
        <div style="display:flex;gap:8px;margin-top:.5rem">
          <button class="btn" style="flex:1;justify-content:center" onclick="S.editRewardIdx=null;render()">ยกเลิก</button>
          <button class="btn btn-b" style="flex:1;justify-content:center" onclick="doSaveReward(${S.editRewardIdx})"><i class="ti ti-device-floppy"></i> บันทึก</button>
        </div>
      </div>
    </div>`;
  })():'';

  const isDesktop = window.innerWidth >= 768;
  return`
    ${editModal}${rewardModal}
    <div class="${isDesktop?'app-desktop':''}">
    ${isDesktop?'<div class="app-sidebar">':''}
    <div class="hrow hrow-sticky">
      <div class="ptitle">ป.6/1 <span style="font-size:14px;font-weight:400;color:var(--muted)">(${Object.keys(DB.students).length} คน)</span></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${pc>0?`<button class="btn btn-a" style="font-size:13px" onclick="go('tpending')"><i class="ti ti-bell"></i> คำขอ (${pc})</button>`:''}
        <button class="btn" style="font-size:13px" onclick="go('taddstudent')"><i class="ti ti-plus"></i> เพิ่ม</button>
        <button class="btn" style="font-size:13px" onclick="doTLogout()"><i class="ti ti-logout"></i> ออก</button>
      </div>
    </div>
    <div class="sw" style="position:sticky;top:56px;z-index:99;background:var(--bg);padding-bottom:.5rem"><i class="ti ti-search"></i>
      <input type="text" placeholder="ค้นหาชื่อหรือเลขประจำตัว" oninput="S.search=this.value;render()" value="${S.search||''}">
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%" class="av-grid">${cards}</div>
    ${isDesktop?'</div></div>':''}`;
}


function vTStudent(){
  const s=DB.students[S.sid];if(!s)return'';
  const t=tot(s);const hw=hwSum(s.hw);const g=isGirl(s.name);
  const logs=s.logs||[];const rl=s.redeemLogs||[];const pend=pendSid(S.sid);
  const chatMsgs=Object.values(DB.messages||{}).filter(m=>m.studentId===S.sid);const unreadFromParent=chatMsgs.filter(m=>m.from==='parent'&&!m.read).length;const pendRedeemCount=Object.values(DB.redeemRequests||{}).filter(r=>r.studentId===S.sid&&r.status==='pending').length;const TABS=[{k:'score',l:'คะแนน',i:'ti-star',dot:pend.length>0},{k:'hw',l:'ส่งงาน',i:'ti-clipboard-check'},{k:'redeem',l:'แลกคะแนน',i:'ti-gift',dot:pendRedeemCount>0},{k:'chat',l:'ข้อความ',i:'ti-message-2',dot:unreadFromParent>0}];
  let content='';
  if(S.tab==='score'){
    const ph=pend.map(req=>`<div class="pcard">
      <div style="font-size:13px;font-weight:600;color:var(--amber);margin-bottom:5px">ขอเพิ่มคะแนน: "${req.desc}"</div>
      <div style="font-size:12px;color:#854F0B;margin-bottom:8px">เสนอ +${req.score} คะแนน · ${req.date}</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-g" style="font-size:13px;padding:6px 12px" onclick="doApprove('${req.id}')"><i class="ti ti-check"></i> อนุมัติ</button>
        <button class="btn btn-r" style="font-size:13px;padding:6px 12px" onclick="doReject('${req.id}')"><i class="ti ti-x"></i> ปฏิเสธ</button>
      </div></div>`).join('');
    const lh=logs.map(l=>`<div class="log-item"><div><span class="badge ${l.score>=0?'bp':'bm'}">${l.score>=0?'+':''}${l.score}</span><span style="margin-left:8px">${l.desc}</span></div><div class="ldate">${l.date}</div></div>`).join('')||'<div style="text-align:center;padding:1rem;color:var(--muted);font-size:14px">ยังไม่มีประวัติ</div>';
    content=`${pend.length>0?`<div class="sec">คำขอรออนุมัติ (${pend.length})</div>${ph}`:''}
      <div style="display:flex;gap:8px;margin-bottom:1.25rem">
        <button class="btn btn-g" style="flex:1;justify-content:center" onclick="openLog('plus')"><i class="ti ti-plus"></i> เพิ่มคะแนน</button>
        <button class="btn btn-r" style="flex:1;justify-content:center" onclick="openLog('minus')"><i class="ti ti-minus"></i> ตัดคะแนน</button>
      </div>
      <div class="sec">ประวัติคะแนน</div><div class="card">${lh}</div>`;
  }else if(S.tab==='hw'){
    const exPhoto=DB.exampleHwPhoto||null;
    const exPhotoHtml=exPhoto?`<div style="margin-bottom:1rem;border-radius:var(--rs);overflow:hidden;border:2px solid var(--green-bd);position:relative">

function go(v){
  S.view=v;S.msg='';S.tab='score';S.search='';S.newName='';S.newId='';
  // Auto-login teacher if saved
  if(v==='tlogin'&&localStorage.getItem('teacher_saved')==='1'){
    const savedPw=localStorage.getItem('teacher_pw')||'';
    if(savedPw===TEACHER_PASS){S.view='tlist';S.role='teacher';startPoll();}
  }
  if(v==='plogin'&&localStorage.getItem('parent_saved')==='1'){
    const savedSid=localStorage.getItem('parent_studentid')||'';
    const savedPwd=localStorage.getItem('parent_pwd')||'';
    if(DB&&DB.students){
      const entry=Object.entries(DB.students).find(([,st])=>st.sid===savedSid&&st.idcard===savedPwd);
      if(entry){S.sid=entry[0];S.view='pview';S.tab='score';S.role='parent';startPoll();}
    }
  }
  render();
}
function setTab(t){S.tab=t;S.chatDraft='';render();}
function doTLogin(){
  const v=document.getElementById('tp')?.value||localStorage.getItem('teacher_pw')||'';

    if(remember){localStorage.setItem('teacher_pw',v);localStorage.setItem('teacher_saved','1');}
    else{localStorage.removeItem('teacher_pw');localStorage.removeItem('teacher_saved');}
    S.view='tlist';S.msg='';S.role='teacher';startPoll();render();

}

async function doSaveEdit(sid){
  const name=document.getElementById('edit_name')?.value?.trim()||'';
  const idcard=document.getElementById('edit_idcard')?.value?.trim()||'';
  if(!name||idcard.length!==13){alert('กรุณากรอกข้อมูลให้ครบ และเลขบัตรต้องเป็น 13 หลัก');return;}
  const conflict=Object.entries(DB.students).find(([id,s])=>s.idcard===idcard&&id!==sid);
  if(conflict){alert('เลขบัตรนี้มีอยู่แล้ว');return;}
  const no=parseInt(document.getElementById('edit_no')?.value||'0')||DB.students[sid].no;
  const sidVal=document.getElementById('edit_sid')?.value?.trim()||'';
  DB.students[sid].name=name;DB.students[sid].idcard=idcard;DB.students[sid].no=no;DB.students[sid].sid=sidVal;
  await api('PATCH',`/students/${sid}`,{name,idcard,no,sid:sidVal});
  S.editSid=null;await loadDB();
}

// ===== Radar Chart =====
function buildRadarSVG(radar, readonly=false){
  const size=readonly?80:160; const cx=size/2; const cy=size/2; const maxR=size*0.385; const n=SUBJECTS.length;
  const max=5;
  function pt(i,val){
    const angle=(Math.PI*2/n)*i - Math.PI/2;
    const r=(val/max)*maxR;
    return{x:cx+r*Math.cos(angle), y:cy+r*Math.sin(angle)};
  }
  function ptOuter(i,r){
    const angle=(Math.PI*2/n)*i - Math.PI/2;
    return{x:cx+r*Math.cos(angle), y:cy+r*Math.sin(angle)};
  }
  // Grid rings
  let rings='';
  for(let r=1;r<=5;r++){
    const pts=SUBJECTS.map((_,i)=>ptOuter(i,(r/5)*maxR));
    rings+=`<polygon points="${pts.map(p=>p.x+','+p.y).join(' ')}" fill="none" stroke="#DBEAFE" stroke-width="${r===5?1.5:0.8}"/>`;
  }
  // Axis lines
  let axes=SUBJECTS.map((_,i)=>{const o=ptOuter(i,maxR);return`<line x1="${cx}" y1="${cy}" x2="${o.x}" y2="${o.y}" stroke="#DBEAFE" stroke-width="0.8"/>`;}).join('');
  // Data polygon
  const vals=SUBJECTS.map(s=>radar[s]||0);
  const dataPts=vals.map((v,i)=>pt(i,v));
  const dataPath=dataPts.map(p=>p.x+','+p.y).join(' ');
  // Labels
  let labels=SUBJECTS.map((s,i)=>{
    const o=ptOuter(i,maxR+10);
    const anchor=o.x<cx-2?'end':o.x>cx+2?'start':'middle';
    const shortName=s.replace('ภาษาอังกฤษ','อังกฤษ').replace('เศรษฐศาสตร์การเงิน','เศรษฐศาสตร์').replace('ประวัติศาสตร์','ประวัติ').replace('คอมพิวเตอร์','คอมฯ').replace('วิทยาศาสตร์','วิทย์').replace('สุขศึกษาและพลศึกษา','สุข&พล').replace('นาฏศิลป์','นาฏศิลป์');
    return`<text x="${o.x}" y="${o.y+3}" text-anchor="${anchor}" font-size="7" fill="#374151" font-family="Sarabun,sans-serif">${shortName}</text>`;
  }).join('');
  // Score dots
  let dots=dataPts.map((p,i)=>vals[i]>0?`<circle cx="${p.x}" cy="${p.y}" r="3" fill="#1A6BC4" stroke="white" stroke-width="1"/>`:'').join('');

  return`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
    ${rings}${axes}
    <polygon points="${dataPath}" fill="#93C5FD" fill-opacity="0.45" stroke="#1A6BC4" stroke-width="1.5"/>
    ${dots}${labels}
  </svg>`;
}

async function setRadar(sid,subj,val){

  if(!s.radar)s.radar={};

// ===== Redeem Request System =====
async function doSubmitRedeemReq(studentId){
  const name=document.getElementById('rr_name')?.value?.trim()||S.redeemReqName||'';
  const cost=parseInt(document.getElementById('rr_cost')?.value||S.redeemReqCost||'0');
  if(!name){alert('กรุณาระบุสิ่งที่ต้องการ');return;}
  if(!cost||cost<1){alert('กรุณาระบุคะแนนที่เสนอ');return;}
  const s=DB.students[studentId];
  if(!s||tot(s)<cost){alert('คะแนนไม่พอสำหรับคำขอนี้');return;}
  if(!DB.redeemRequests) DB.redeemRequests={};
  const id='rr'+Date.now();
  DB.redeemRequests[id]={id,studentId,name,cost,date:today(),status:'pending'};
  S.redeemReqName='';S.redeemReqCost='';
  await api('POST','/data',DB);
  alert('ส่งคำขอให้ครูแล้ว รอการอนุมัติ');
  render();
}
async function doApproveRedeem(rid){
  const req=(DB.redeemRequests||{})[rid];if(!req)return;
  const s=DB.students[req.studentId];
  if(!s||tot(s)<req.cost){alert('คะแนนนักเรียนไม่พอ');return;}
  req.status='approved';
  s.logs=[{desc:`แลก (อนุมัติ): ${req.name}`,score:-req.cost,date:today()},...(s.logs||[])];
  s.redeemLogs=[{name:req.name,cost:req.cost,date:today()},...(s.redeemLogs||[])];
  await api('PATCH',`/students/${req.studentId}`,{logs:s.logs,redeemLogs:s.redeemLogs});
  await api('POST','/data',DB);
  render();
}
async function doRejectRedeem(rid){
  const req=(DB.redeemRequests||{})[rid];if(!req)return;
  req.status='rejected';
  await api('POST','/data',DB);
  render();
}

function openAddReward(){
  if(!DB.rewards||DB.rewards.length===0) DB.rewards=[...DEFAULT_REWARDS];
  S.editRewardIdx=-1;render();
}
async function doSaveReward(idx){
  const name=document.getElementById('rew_name')?.value?.trim()||'';
  const cost=parseInt(document.getElementById('rew_cost')?.value||'0');
  if(!name||isNaN(cost)||cost<1){alert('กรุณากรอกข้อมูลให้ครบ');return;}
  if(!DB.rewards||DB.rewards.length===0) DB.rewards=[...DEFAULT_REWARDS];
  if(idx===-1){
    DB.rewards.push({id:'r'+Date.now(),name,cost});
  } else {
    DB.rewards[idx]={...DB.rewards[idx],name,cost};
  }
  S.editRewardIdx=null;
  await api('POST','/data',DB);
  render();
}
async function doDeleteReward(idx){
  const r=getRewards()[idx];if(!r)return;
  if(!confirm(`ลบ "${r.name}" ออกจากรายการแลกคะแนน?`))return;
  if(!DB.rewards||DB.rewards.length===0) DB.rewards=[...DEFAULT_REWARDS];
  DB.rewards.splice(idx,1);
  await api('POST','/data',DB);
  render();
}

function nowStr(){const d=new Date();const y=d.getFullYear()+543;const m=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];return`${d.getDate()} ${m[d.getMonth()]} ${y} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}

async function doSendMsg(studentId, from){
  const inputId = from==='teacher'?'chat_input':'chat_input_p';
  const input = document.getElementById(inputId);
  if(!input) return;
  const text = (input.value||S.chatDraft||'').trim();
  if(!text) return;
  input.value='';S.chatDraft='';
  if(!DB.messages) DB.messages={};
  const msgId = 'msg'+Date.now();
  DB.messages[msgId]={id:msgId,studentId,from,text,ts:Date.now(),timeStr:nowStr(),read:false};
  await api('POST','/data',DB);
  render();
  setTimeout(()=>{
    const cb=document.getElementById(from==='teacher'?'chatbox':'chatboxP');
    if(cb) cb.scrollTop=cb.scrollHeight;
    const inp=document.getElementById(from==='teacher'?'chat_input':'chat_input_p');
    if(inp) inp.focus();
  },50);
}

async function doMarkRead(studentId, from){
  let changed=false;
  Object.values(DB.messages||{}).forEach(m=>{if(m.studentId===studentId&&m.from===from&&!m.read){m.read=true;changed=true;}});
  if(changed) await api('POST','/data',DB);
}

async function doDeleteMsg(studentId, msgId){
  if(!msgId||!DB.messages||!DB.messages[msgId]) return;
  if(!confirm('ลบข้อความนี้?')) return;
  delete DB.messages[msgId];
  await api('POST','/data',DB);
  render();
  setTimeout(()=>{
    const cb=document.getElementById('chatbox')||document.getElementById('chatboxP');
    if(cb) cb.scrollTop=cb.scrollHeight;
  },50);
}
